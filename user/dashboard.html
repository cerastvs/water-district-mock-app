<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Water District</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="logo">Water<span>District</span></h2>
            </div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="active">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="weekly-bill.html">
                    <i class="fas fa-file-invoice-dollar"></i> Weekly Bill
                </a>
                <a href="history.html">
                    <i class="fas fa-history"></i> History
                </a>
                <a href="announcements.html">
                    <i class="fas fa-bullhorn"></i> Announcements
                </a>
                <a href="usage.html">
                    <i class="fas fa-chart-line"></i> Usage Comparison
                </a>
                <a href="goals.html">
                    <i class="fas fa-bullseye"></i> Goal Setting
                </a>
                <a href="../login.html" class="logout-link">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="menu-toggle" id="menu-toggle">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="user-info">
                    <span>Welcome, <strong id="user-name">User</strong></span>
                </div>
            </header>

            <section class="dashboard-content">
                <h1>Welcome, <span id="display-username">User</span>!</h1>
                <div class="dashboard-grid">
                    <div class="card">
                        <h3 id="bill-month-label">Total Bill (Current Month)</h3>
                        <p class="amount" id="dashboard-total">₱ 0.00</p>
                    </div>
                    <div class="card">
                        <h3>Meter Number</h3>
                        <p class="amount" style="font-size: 1.5rem;" id="dashboard-meter">---</p>
                    </div>
                </div>

                <div class="card" style="margin-top: 2rem;">
                    <h3>Recent History</h3>
                    <table class="history-preview">
                        <thead>
                            <tr>
                                <th>Month</th>
                                <th>Total Paid</th>
                            </tr>
                        </thead>
                        <tbody id="history-preview-body">
                            <!-- History preview will go here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/user.js"></script>
</body>

</html>
