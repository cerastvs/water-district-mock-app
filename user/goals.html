<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Setting - Water District</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div><i class="fas fa-tint" style="color: #60A5FA; font-size: 28px;"></i></div>
                <div>
                    <h2 class="logo" style="font-size: 1.1rem; line-height: 1.2;">SRNE Water<br><span
                            style="font-size: 0.6rem; color: #94A3B8; font-weight: 600; letter-spacing: 0.5px;">DISTRICT
                            PORTAL</span></h2>
                </div>
            </div>

            <div class="sidebar-section">MAIN MENU</div>
            <nav class="sidebar-menu">
                <a href="dashboard.html">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="weekly-bill.html">
                    <i class="fas fa-calendar-alt"></i> Weekly Bill
                </a>
                <a href="history.html">
                    <i class="fas fa-history"></i> History
                </a>
                <a href="announcements.html">
                    <i class="fas fa-bell"></i> Notifications
                </a>
            </nav>

            <div class="sidebar-section">UTILITIES</div>
            <nav class="sidebar-menu">
                <a href="announcements.html">
                    <i class="fas fa-bullhorn"></i> Special Announcement
                </a>
                <a href="usage.html">
                    <i class="fas fa-chart-line"></i> Usage Comparison
                </a>
                <a href="goals.html" class="active">
                    <i class="fas fa-bullseye"></i> Goal Setting
                </a>
                <a href="#">
                    <i class="fas fa-lightbulb"></i> How to be Wise User
                </a>
            </nav>

            <div
                style="margin-top: auto; padding: 1rem; border-top: 1px solid rgba(255,255,255,0.05); margin-left: -1rem; margin-right: -1rem; padding-left: 2rem;">
                <div style="display: flex; align-items: center; gap: 12px; justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div
                            style="width: 36px; height: 36px; background-color: #3B82F6; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">
                            U</div>
                        <div>
                            <div style="font-size: 0.85rem; font-weight: 600; color: white;" id="sidebar-username">User
                            </div>
                            <a href="../login.html" class="logout-link"
                                style="font-size: 0.75rem; color: #94A3B8; text-decoration: none; display: block; margin-top: 2px;">Sign
                                Out</a>
                        </div>
                    </div>
                    <i class="fas fa-sign-out-alt" onclick="window.location.href='../login.html'"
                        style="color: #94A3B8; font-size: 1rem; cursor: pointer; padding-right: 1rem;"></i>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="user-info">
                    <span>Welcome, <strong id="user-name">User</strong></span>
                </div>
            </header>

            <section class="dashboard-content">
                <h1>Goal Setting</h1>
                <div class="dashboard-grid">
                    <div class="card">
                        <h3>Set Your Monthly Usage Goal</h3>
                        <form id="goal-form">
                            <div class="form-group">
                                <label for="monthly-goal">Target Usage (m³):</label>
                                <input type="number" id="monthly-goal" name="monthly-goal" min="0" step="0.1">
                            </div>
                            <button type="submit" class="btn btn-primary">Save Goal</button>
                        </form>
                    </div>

                    <div class="card">
                        <h3>Ways to Decrease Your Bill</h3>
                        <ul style="list-style: none; padding: 0; margin-top: 1rem;">
                            <li style="margin-bottom: 0.8rem;"><label style="cursor: pointer;"><input type="checkbox"
                                        class="goal-checkbox" style="margin-right: 0.5rem;"> Decrease shower
                                    time</label></li>
                            <li style="margin-bottom: 0.8rem;"><label style="cursor: pointer;"><input type="checkbox"
                                        class="goal-checkbox" style="margin-right: 0.5rem;"> Fix leaky faucets</label>
                            </li>
                            <li style="margin-bottom: 0.8rem;"><label style="cursor: pointer;"><input type="checkbox"
                                        class="goal-checkbox" style="margin-right: 0.5rem;"> Turn off water while
                                    brushing teeth</label></li>
                            <li style="margin-bottom: 0.8rem;"><label style="cursor: pointer;"><input type="checkbox"
                                        class="goal-checkbox" style="margin-right: 0.5rem;"> Use washing machine only
                                    for full loads</label></li>
                        </ul>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/user.js"></script>
</body>

</html>
