<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SRNE Water District Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="login-page">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="brand-logo">
          <i class="fas fa-tint"></i>
        </div>
        <h1>SRNE Water</h1>
        <p>District Account Portal</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-container">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-container">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="login-btn">
            Sign In <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      </form>

      <div class="login-footer">
        <a href="index.html" class="back-home">
          <i class="fas fa-arrow-left"></i> Back to Homepage
        </a>
      </div>
    </div>
    
    <div class="login-info">
      <p>&copy; 2026 Santa Rosa Nueva Ecija Water District. <br> All Rights Reserved.</p>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      login(user, pass);
    });
  </script>
</body>

</html>
