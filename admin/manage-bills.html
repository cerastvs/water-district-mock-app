<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bills - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="logo">WD-<span>Admin</span></h2>
            </div>
            <nav class="sidebar-menu">
                <a href="dashboard.html">
                    <i class="fas fa-chart-line"></i> Overview
                </a>
                <a href="manage-bills.html" class="active">
                    <i class="fas fa-file-invoice-dollar"></i> Manage Bills
                </a>
                <a href="manage-users.html">
                    <i class="fas fa-users"></i> Manage Users
                </a>
                <a href="announcements.html">
                    <i class="fas fa-bullhorn"></i> Announcements
                </a>
                <a href="../login.html" class="logout-link">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="menu-toggle" id="menu-toggle">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="user-info">
                    <span>Admin Panel | <strong id="admin-name">Admin</strong></span>
                </div>
            </header>

            <section class="dashboard-content">
                <h1>Manage User Bills</h1>
                <div class="card">
                    <h3>User List</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Meter No</th>
                                <th>Current Month</th>
                                <th>Total Bill</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="user-bills-table">
                            <!-- Users will be listed here -->
                        </tbody>
                    </table>
                </div>

                <!-- Edit Bill Modal (Simple) -->
                <div id="edit-bill-modal" class="modal" style="display:none;">
                    <div class="modal-content card">
                        <h3>Edit Bill for <span id="edit-username"></span></h3>
                        <form id="edit-bill-form">
                            <input type="hidden" id="edit-user-index">
                            <div class="form-group">
                                <label>Week 1 Amount (₱):</label>
                                <input type="number" id="week1" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <label>Week 2 Amount (₱):</label>
                                <input type="number" id="week2" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <label>Week 3 Amount (₱):</label>
                                <input type="number" id="week3" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <label>Week 4 Amount (₱):</label>
                                <input type="number" id="week4" step="0.01" required>
                            </div>
                            <div class="modal-actions">
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                                <button type="button" class="btn btn-accent" id="close-modal">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
