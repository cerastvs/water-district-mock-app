<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Water District</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="logo">WD-<span>Admin</span></h2>
            </div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="active">
                    <i class="fas fa-chart-line"></i> Overview
                </a>
                <a href="manage-bills.html">
                    <i class="fas fa-file-invoice-dollar"></i> Manage Bills
                </a>
                <a href="manage-users.html">
                    <i class="fas fa-users"></i> Manage Users
                </a>
                <a href="announcements.html">
                    <i class="fas fa-bullhorn"></i> Announcements
                </a>
                <a href="../login.html" class="logout-link">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="menu-toggle" id="menu-toggle">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="user-info">
                    <span>Admin Panel | <strong id="admin-name">Admin</strong></span>
                </div>
            </header>

            <section class="dashboard-content">
                <h1>Admin Overview</h1>
                <div class="dashboard-grid">
                    <div class="card">
                        <h3>Total Users</h3>
                        <p id="total-users-count" class="amount">0</p>
                    </div>
                    <div class="card">
                        <h3>Pending Bills</h3>
                        <p id="pending-bills-count" class="amount">0</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
